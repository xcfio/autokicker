name: Code Test

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            # Setup Action
            - name: Setup Action
              uses: actions/checkout@v4

            # Setup PNPM
            - name: Setup PNPM
              uses: pnpm/action-setup@v4

            # Setup Node.js
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  cache: "pnpm"

            # Install dependencies
            - name: Install dependencies
              run: (pnpm install --no-frozen-lockfile) || true

            # Disable Turbo Telemetry to prevent potential issues in CI environment
            - name: Disable Turbo Telemetry
              run: pnpm exec turbo telemetry disable > /dev/null 2>&1 && echo "Turbo Telemetry disabled"

            # Run test
            - name: Run test
              run: node --run test
