name: Pull Request to Production on Release
on:
    release:
        types: [published]

jobs:
    pr:
        if: github.event.release.target_commitish == 'main'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Sync package.json version with tag
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                    npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add package.json package-lock.json
                    git commit -m "chore: bump version to $TAG_VERSION"
                    git push origin HEAD:main
                  fi

            - name: Open PR to production
              id: pr
              uses: peter-evans/create-pull-request@v7
              with:
                  base: production
                  branch: release/${{ github.event.release.tag_name }}
                  title: "Release ${{ github.event.release.tag_name }} → production"
                  body: "Auto PR for release ${{ github.event.release.tag_name }}"

            - name: Enable auto-merge
              run: gh pr merge "${{ steps.pr.outputs.pull-request-number }}" --merge --auto
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
