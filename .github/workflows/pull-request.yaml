name: Pull Request to Production on Release

on:
    release:
        types: [published]

jobs:
    pull-request:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - uses: actions/checkout@v5
              with:
                  ref: main
                  fetch-depth: 0

            - name: Sync package.json version with tag
              run: |
                  RAW_TAG="${GITHUB_REF_NAME}"
                  TAG_VERSION="${RAW_TAG#v}"
                  echo "RAW_TAG=[$RAW_TAG]"
                  echo "TAG_VERSION=[$TAG_VERSION]"

                  if [ -z "$TAG_VERSION" ]; then
                      echo "::error::TAG_VERSION is empty — GITHUB_REF_NAME was '$RAW_TAG'"
                      exit 1
                  fi

                  PKG_VERSION=$(node -p "require('./package.json').version")
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                      npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
                      git config user.name "github-actions[bot]"
                      git config user.email "github-actions[bot]@users.noreply.github.com"
                      git add package.json package-lock.json
                      git commit -m "chore: bump version to $TAG_VERSION"
                      git push origin HEAD:main
                  fi

            - name: Open PR to production
              uses: peter-evans/create-pull-request@v7
              with:
                  base: production
                  branch: release/${{ github.event.release.tag_name }}
                  title: "Release ${{ github.event.release.tag_name }} → production"
                  body: "Auto PR for release ${{ github.event.release.tag_name }}"
